name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  checks: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build application
        run: mvn -pl app clean compile -DskipTests -q

      - name: Compile integration tests
        run: mvn -pl integration-tests clean compile test-compile -DskipTests -q

      - name: Start application
        run: |
          mvn -pl app spring-boot:run -DskipTests &
          echo "Waiting for application to start..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8080/api/hello > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Application failed to start within 60 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Run integration tests
        run: mvn -pl integration-tests test || true

      - name: Stop application
        if: always()
        run: |
          pkill -f 'spring-boot:run' || true
          pkill -f 'BackendProtocolsDemoApplication' || true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure report
        if: always()
        run: |
          cp -r gh-pages/history integration-tests/target/allure-results/history 2>/dev/null || true
          allure generate integration-tests/target/allure-results --clean -o allure-report

      - name: Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Allure report as Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy:
    needs: integration-tests
    if: always()
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
